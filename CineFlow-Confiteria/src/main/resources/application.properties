spring.application.name=CineFlow_Confiteria
server.port=8083

# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/confiteria?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.backend.CineFlow=DEBUG
logging.level.org.springframework.web=DEBUG

# RabbitMQ (Event Bus)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.events.exchange=cineflow.events.exchange
app.events.ticket-paid.routing-key=ticket.paid
app.events.ticket-paid.confiteria-queue=ticket.paid.confiteria.queue
