spring.application.name=CineFlow


# Configuración de Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/entradas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate/JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8084

# RabbitMQ (Event Bus)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.events.exchange=cineflow.events.exchange
app.events.ticket-paid.routing-key=ticket.paid
app.events.ticket-reserved.routing-key=ticket.reserved
app.events.ticket-paid.notifications-queue=ticket.paid.notifications.queue

# Email notifications
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

